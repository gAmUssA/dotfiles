[storage]
engine = icloud
directory = Mackup

[applications_to_sync]
# NOTE: Mackup is effectively retired here. A 2026 audit found nothing was
# symlinked anymore (cfprefsd broke the model on modern macOS) and the iCloud
# copies were years stale. Everything that matters moved to the dotfiles repo:
#   moom, popclip, bartender, taskpaper, istat-menus, marked2, cyberduck
#     -> prefs-backup.sh / prefs-restore.sh (defaults export/import snapshots)
#   karabiner-elements -> karabiner/ + linkall.sh symlink
#   micro              -> micro/ + linkall.sh symlinks
#   ghostty            -> ghostty/ + linkall.sh symlink (was already there)
# Deliberately NOT synced anywhere public:
#   textexpander (serial in prefs; has its own cloud sync)
#   kubectl (~/.kube/config = cluster credentials)
#   docker (~/.docker/config.json = registry tokens)
#   brave (Brave Sync), macosx (system prefs), hyper/bat/asciinema/go2shell (dead)
# The list below is intentionally EMPTY so an accidental `mackup backup` can't
# sync credentials (kubectl/docker) to iCloud.
